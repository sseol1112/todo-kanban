<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Todo Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>업무용 Todo List ver1</h1>    
  </header>

  <main class="container">
    <section class="panel form-panel">
      <h2>작업 추가 / 수정</h2>
      <form id="task-form" autocomplete="off">
        <input type="hidden" id="task-id" />

        <label for="title">제목</label>
        <input id="title" name="title" type="text" maxlength="80" required placeholder="예: API 문서 업데이트" />

        <label for="description">설명</label>
        <textarea id="description" name="description" rows="3" maxlength="300" placeholder="상세 내용"></textarea>

        <div class="row">
          <div>
            <label for="priority">우선순위</label>
            <select id="priority" name="priority">
              <option value="high">높음</option>
              <option value="medium" selected>보통</option>
              <option value="low">낮음</option>
            </select>
          </div>
          <div>
            <label for="status">상태</label>
            <select id="status" name="status">
              <option value="todo" selected>진행예정</option>
              <option value="doing">진행중</option>
              <option value="done">완료</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="save-btn">저장</button>
          <button type="button" id="reset-btn" class="ghost">초기화</button>
        </div>
      </form>
    </section>

    <section class="content-area">
      <section class="panel filter-bar" aria-label="작업 필터">
        <div class="filter-row">
          <div class="filter-item">
            <label for="filter-view">보기</label>
            <select id="filter-view">
              <option value="board" selected>칸반 보드</option>
              <option value="list">단일 목록</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="filter-status">작업상태</label>
            <select id="filter-status">
              <option value="all" selected>전체</option>
              <option value="todo">진행예정</option>
              <option value="doing">진행중</option>
              <option value="done">완료</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="filter-priority">우선순위</label>
            <select id="filter-priority">
              <option value="all" selected>전체</option>
              <option value="high">높음</option>
              <option value="medium">보통</option>
              <option value="low">낮음</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="filter-date">등록일</label>
            <select id="filter-date">
              <option value="newest" selected>최신 등록순</option>
              <option value="oldest">오래된 등록순</option>
            </select>
          </div>
        </div>
      </section>

      <section class="board" id="board">
        <article class="column" data-status="todo">
          <header>
            <h3>진행예정</h3>
            <span class="count" id="count-todo">0</span>
          </header>
          <div class="dropzone" id="todo-list"></div>
        </article>

        <article class="column" data-status="doing">
          <header>
            <h3>진행중</h3>
            <span class="count" id="count-doing">0</span>
          </header>
          <div class="dropzone" id="doing-list"></div>
        </article>

        <article class="column" data-status="done">
          <header>
            <h3>완료</h3>
            <span class="count" id="count-done">0</span>
          </header>
          <div class="dropzone" id="done-list"></div>
        </article>
      </section>

      <section class="panel single-list hidden" id="single-list-panel">
        <header>
          <h3>작업 목록</h3>
          <span class="count" id="count-all">0</span>
        </header>
        <div class="dropzone list-dropzone" id="all-list"></div>
      </section>
    </section>
  </main>

  <template id="task-template">
    <div class="task" draggable="true">
      <div class="task-head">
        <strong class="task-title"></strong>
        <span class="priority"></span>
      </div>
      <p class="task-desc"></p>
      <div class="task-foot">
        <small class="timestamp"></small>
        <div class="card-actions">
          <button class="edit">수정</button>
          <button class="delete danger">삭제</button>
        </div>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
